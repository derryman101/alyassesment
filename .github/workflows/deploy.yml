name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  APP_NAME: nodeapp-cicd-demo
  AWS_REGION: us-east-1

jobs:
  # ─── Job 1: Build & Test ───────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Job 2: Docker Build & Push ───────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}:latest \
            .

          docker push $ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}:latest

          echo "image=$ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Save image URI for deploy job
        run: echo "${{ steps.build-image.outputs.image }}" > image-uri.txt

      - name: Upload image URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-uri
          path: image-uri.txt

  # ─── Job 3: Deploy to EC2 ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download image URI
        uses: actions/download-artifact@v4
        with:
          name: image-uri

      - name: Read image URI
        id: read-image
        run: echo "image_uri=$(cat image-uri.txt)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}',
              'docker pull ${{ steps.read-image.outputs.image_uri }}',
              'docker stop ${{ env.APP_NAME }} || true',
              'docker rm ${{ env.APP_NAME }} || true',
              'docker run -d --name ${{ env.APP_NAME }} --restart unless-stopped -p 80:3000 -e NODE_ENV=production -e APP_VERSION=${{ github.sha }} ${{ steps.read-image.outputs.image_uri }}',
              'docker system prune -f'
            ]" \
            --region ${{ env.AWS_REGION }}

      - name: Verify deployment health
        run: |
          echo "Waiting 15s for container startup..."
          sleep 15
          INSTANCE_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "Checking health at http://$INSTANCE_IP/health"
          curl --fail --retry 5 --retry-delay 5 http://$INSTANCE_IP/health
          echo "Deployment verified successfully!"
